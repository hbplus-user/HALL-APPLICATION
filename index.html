<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/j9p70JY3/client-logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HB+ Proctoring System – Secure online examination platform with live monitoring" />
    <title>HB+ Proctoring System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- TensorFlow.js and COCO-SSD — deferred so they don't block page paint -->
    <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <!-- jsPDF — deferred -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      /* Branded Splash Screen */
      #splash {
        position: fixed;
        inset: 0;
        background: #EDE0D0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-logo {
        font-size: 5rem;
        font-weight: 900;
        color: #53372B;
        letter-spacing: 6px;
        font-family: Tahoma, sans-serif;
        margin-bottom: 30px;
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.05); opacity: 0.8; }
      }
      #splash-bar-wrap {
        width: 200px;
        height: 6px;
        background: rgba(83,55,43,0.15);
        border-radius: 10px;
        overflow: hidden;
        position: relative;
      }
      #splash-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #747440, #53372B);
        border-radius: 10px;
        animation: loadProgress 2s ease-out forwards;
      }
      @keyframes loadProgress {
        0% { width: 0%; }
        100% { width: 100%; }
      }
      #splash-text {
        margin-top: 20px;
        font-size: 0.9rem;
        color: #A9674D;
        letter-spacing: 2px;
        font-family: Tahoma, sans-serif;
        text-transform: uppercase;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-logo">HB+</div>
      <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
      <div id="splash-text">System Initializing</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide splash once React has painted the first frame
      window.__hideSplash = function () {
        var s = document.getElementById('splash');
        if (s) {
          s.classList.add('hidden');
          setTimeout(function () { s.remove(); }, 500);
        }
      };
    </script>
  </body>
</html>
